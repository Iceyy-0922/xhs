<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>小红书网页版 - 对话功能</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config({
      theme: {
        extend: {
          colors: {
            xhs: '#FF2442',
            xhsHover: '#E01F3A',
            grayBg: '#F5F5F5',
            grayText: '#666666',
            lightGray: '#FAFAFA',
          },
          fontFamily: {
            sans: ['Inter', '思源黑体', 'system-ui']
          }
        }
      }
    })
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .text-ellipsis { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
      .msg-bubble-left { @apply bg-grayBg rounded-lg rounded-tl-none px-4 py-3 max-w-[60%] text-black; }
      .msg-bubble-right { @apply bg-xhs text-white rounded-lg rounded-tr-none px-4 py-3 max-w-[60%]; }
      .sidebar-item { @apply flex items-center gap-3 p-3 rounded-lg hover:bg-lightGray cursor-pointer text-grayText; }
      .sidebar-item-active { @apply bg-lightGray font-medium text-black; }
      .btn-primary { @apply bg-xhs text-white px-4 py-2 rounded-lg hover:bg-xhsHover transition; }
      .btn-outline { @apply border border-gray-300 px-3 py-1.5 rounded-lg text-sm hover:bg-lightGray; }
    }
  </style>
</head>
<body class="bg-white text-black font-sans antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- 左侧菜单 -->
    <div class="w-60 bg-white border-r border-gray-200 p-4 flex flex-col">
      <div class="mb-8">
        <div class="text-xl font-bold text-xhs mb-6">小红书</div>
        <div class="sidebar-item"><i class="fa fa-home"></i> 首页</div>
        <div class="sidebar-item"><i class="fa fa-compass"></i> 发现</div>
        <div class="sidebar-item"><i class="fa fa-bookmark"></i> 收藏</div>
        <div class="sidebar-item sidebar-item-active mt-2 relative">
          <i class="fa fa-bell"></i> 通知 / 对话
          <div class="absolute top-2 right-2 w-2 h-2 bg-xhs rounded-full"></div>
        </div>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="flex h-full">
        <!-- 对话列表 -->
        <div id="chatList" class="w-80 border-r border-gray-200 flex flex-col">
          <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between items-center mb-3">
              <h2 class="text-lg font-semibold">对话</h2>
              <div class="flex gap-2">
                <button id="batchBtn" class="btn-outline text-sm">多选</button>
                <button class="btn-primary text-sm">新对话</button>
              </div>
            </div>
            <input placeholder="搜索对话或联系人" class="w-full px-3 py-2 bg-grayBg rounded-lg border-none outline-none text-sm mb-3">
            <div class="flex gap-2 text-xs">
              <button class="px-2 py-1 bg-xhs text-white rounded-full">全部</button>
              <button class="px-2 py-1 hover:bg-grayBg rounded-full">未读</button>
              <button class="px-2 py-1 hover:bg-grayBg rounded-full">关注的人</button>
            </div>
          </div>

          <div class="flex-1 overflow-y-auto">
            <!-- 对话项 -->
            <div class="chat-item p-4 border-b border-gray-100 hover:bg-lightGray cursor-pointer flex items-center gap-3 relative">
              <div class="w-10 h-10 rounded-full bg-grayBg"></div>
              <div class="flex-1">
                <div class="font-medium">穿搭设计师</div>
                <div class="text-sm text-grayText text-ellipsis">请问你分享的那条裙子链接有吗？</div>
              </div>
              <div class="text-xs text-grayText">10:25</div>
              <div class="absolute top-3 right-3 w-2 h-2 bg-xhs rounded-full"></div>
            </div>

            <div class="chat-item p-4 border-b border-gray-100 hover:bg-lightGray cursor-pointer flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-grayBg"></div>
              <div class="flex-1">
                <div class="font-medium">美食教程</div>
                <div class="text-sm text-grayText text-ellipsis">谢谢支持～</div>
              </div>
              <div class="text-xs text-grayText">昨天</div>
            </div>
          </div>
        </div>

        <!-- 对话窗口 -->
        <div id="chatWindow" class="flex-1 flex flex-col">
          <!-- 顶部信息 -->
          <div class="p-4 border-b border-gray-200 flex justify-between items-center">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-grayBg"></div>
              <div>
                <div class="font-medium">穿搭设计师</div>
                <div class="text-xs text-green-500">在线</div>
              </div>
            </div>
            <div class="text-grayText cursor-pointer"><i class="fa fa-ellipsis-h"></i></div>
          </div>

          <!-- 消息区 -->
          <div class="flex-1 p-6 overflow-y-auto flex flex-col gap-4">
            <div class="flex justify-start">
              <div class="msg-bubble-left">请问你分享的那条裙子链接有吗？</div>
            </div>
            <div class="flex justify-end">
              <div class="msg-bubble-right">有的哦～我发你</div>
            </div>
            <div id="typingStatus" class="text-xs text-grayText italic hidden">对方正在输入...</div>
          </div>

          <!-- 快捷回复 -->
          <div class="px-6 py-2 flex gap-2 border-t border-gray-100">
            <button class="btn-outline text-xs">谢谢</button>
            <button class="btn-outline text-xs">请问链接是？</button>
            <button class="btn-outline text-xs">可以详细说一下吗</button>
          </div>

          <!-- 输入框 -->
          <div class="p-4 border-t border-gray-200">
            <div class="flex gap-2">
              <button class="btn-outline"><i class="fa fa-image"></i></button>
              <button id="templateBtn" class="btn-outline">模板</button>
              <input id="msgInput" placeholder="输入消息..." class="flex-1 px-4 py-2 bg-grayBg rounded-lg border-none outline-none">
              <button id="sendBtn" class="btn-primary">发送</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 快捷模板弹窗 -->
  <div id="templateModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
    <div class="bg-white w-80 rounded-xl p-5">
      <h3 class="font-semibold mb-3">快捷回复模板</h3>
      <div class="mb-3 p-2 bg-grayBg rounded-lg cursor-pointer">请问具体是哪款产品？</div>
      <div class="mb-3 p-2 bg-grayBg rounded-lg cursor-pointer">合作请走业务合作入口</div>
      <div class="p-2 bg-grayBg rounded-lg cursor-pointer">教程在我的笔记合集里</div>
      <div class="mt-4 text-right">
        <button id="closeTemplate" class="btn-outline text-sm">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatWindow = document.querySelector('.flex-1.overflow-y-auto');
    const typingStatus = document.getElementById('typingStatus');
    const templateBtn = document.getElementById('templateBtn');
    const templateModal = document.getElementById('templateModal');
    const closeTemplate = document.getElementById('closeTemplate');
    const batchBtn = document.getElementById('batchBtn');

    // 发送消息
    sendBtn.addEventListener('click', () => {
      const content = msgInput.value.trim();
      if (!content) return;
      addMessage(content, 'right');
      msgInput.value = '';
      showTyping();
      setTimeout(() => {
        hideTyping();
        streamMessage('马上发你哈～', 'left');
      }, 2000);
    });

    // 普通消息
    function addMessage(text, side) {
      const div = document.createElement('div');
      div.className = side === 'right' ? 'flex justify-end' : 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = side === 'right' ? 'msg-bubble-right' : 'msg-bubble-left';
      bubble.innerText = text;
      div.appendChild(bubble);
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // 流式消息（创新功能）
    function streamMessage(text, side) {
      const div = document.createElement('div');
      div.className = side === 'right' ? 'flex justify-end' : 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = side === 'right' ? 'msg-bubble-right' : 'msg-bubble-left';
      div.appendChild(bubble);
      chatWindow.appendChild(div);
      let i = 0;
      const interval = setInterval(() => {
        bubble.innerText += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }, 50);
    }

    // 对方正在输入（创新功能）
    function showTyping() { typingStatus.classList.remove('hidden'); }
    function hideTyping() { typingStatus.classList.add('hidden'); }

    // 快捷模板
    templateBtn.addEventListener('click', () => templateModal.classList.remove('hidden'));
    closeTemplate.addEventListener('click', () => templateModal.classList.add('hidden'));

    // 批量模式
    let batchMode = false;
    batchBtn.addEventListener('click', () => {
      batchMode = !batchMode;
      batchBtn.innerText = batchMode ? '取消多选' : '多选';
    });

    // 回车发送
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>
</body>
</html>
